<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anthem Controls</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <header class="topbar">
      <div>
        <h1>Anthem Receiver</h1>
        <p class="subtitle">Quick zone controls</p>
      </div>
      <div class="topbar-actions">
        <button id="refresh" class="icon-only" title="Refresh" aria-label="Refresh">↻</button>
        <button id="settings_toggle" class="icon-only" title="Settings" aria-label="Settings">⚙</button>
      </div>
    </header>

    <section class="card">
      <div class="meta-row">
        <span class="meta-label">Host</span>
        <span id="host_summary" class="meta-value">192.168.1.89:8080</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">Zone</span>
        <span id="zone_summary" class="meta-value">Main Zone</span>
      </div>
      <div id="status" class="status disconnected">Disconnected</div>
    </section>

    <section id="settings_panel" class="card hidden">
      <div class="settings-title-row">
        <h2>Settings</h2>
        <button id="settings_close" class="icon-only" title="Close settings" aria-label="Close settings">✕</button>
      </div>
      <label for="host">Receiver Host</label>
      <div class="row">
        <input id="host" type="text" value="192.168.1.89:8080" />
      </div>

      <label for="zone">Zone</label>
      <select id="zone">
        <option value="1">Main Zone</option>
        <option value="2">Zone 2</option>
      </select>

      <div class="row">
        <button id="save_settings">Save Settings</button>
        <button id="connect">Connect</button>
      </div>
    </section>

    <section class="card">
      <label for="volume">Volume (dB)</label>
      <div class="row volume-row">
        <button id="volume_down" type="button">-</button>
        <input id="volume" type="range" min="-90" max="0" step="0.5" value="-35">
        <button id="volume_up" type="button">+</button>
        <output id="volume_value">-35.0</output>
      </div>

      <label for="max_volume">Max Volume (dB)</label>
      <div class="row">
        <input id="max_volume" type="number" min="-90" max="0" step="0.5" value="0">
        <button id="save_max_volume" type="button">Save Max</button>
      </div>
    </section>

    <section class="card">
      <div class="row action-row">
        <button id="power" class="icon-button" title="Power" aria-label="Power">⏻</button>
        <button id="mute" class="icon-button" title="Mute" aria-label="Mute">
          <span class="mute-icon" aria-hidden="true">
            <span class="mute-glyph">🔊</span>
            <span class="mute-slash"></span>
          </span>
        </button>
      </div>
    </section>

    <section class="card">
      <label for="input">Input</label>
      <select id="input"></select>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
