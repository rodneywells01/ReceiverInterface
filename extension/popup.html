<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anthem Controls</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <h1>Anthem Controls</h1>

    <label for="host">Receiver Host</label>
    <div class="row">
      <input id="host" type="text" value="192.168.1.89:8080" />
      <button id="connect">Connect</button>
    </div>

    <div id="status" class="status disconnected">Disconnected</div>

    <label for="zone">Zone</label>
    <select id="zone">
      <option value="1">Main Zone</option>
      <option value="2">Zone 2</option>
    </select>

    <div class="row">
      <button id="power">Power Off</button>
      <button id="mute">Mute Off</button>
      <button id="refresh">Refresh</button>
    </div>

    <label for="volume">Volume (dB)</label>
    <div class="row">
      <input id="volume" type="range" min="-90" max="0" step="0.5" value="-35">
      <output id="volume_value">-35.0</output>
    </div>

    <label for="input">Input</label>
    <select id="input"></select>
  </main>

  <script src="popup.js"></script>
</body>
</html>
